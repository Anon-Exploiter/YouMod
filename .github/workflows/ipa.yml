name: Build IPA with tweaks
on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YouTube"
        required: true
        type: string

      bundle_id:
        description: "Bundle ID (Optional)"
        default: "com.google.ios.youtube"
        required: true
        type: string

      youpip:
        description: "Integrate YouPiP"
        default: true
        required: false
        type: boolean

      ytuhd:
        description: "Integrate YTUHD"
        default: true
        required: false
        type: boolean

      ryd:
        description: "Integrate Return-YouTube-Dislikes"
        default: true
        required: false
        type: boolean

      abconfig:
        description: "Integrate YTABConfig"
        default: true
        required: false
        type: boolean

      youquality:
        description: "Integrate YouQuality"
        default: true
        required: false
        type: boolean

      youspeed:
        description: "Integrate YouSpeed"
        default: true
        required: false
        type: boolean

      demc:
        description: "Integrate DontEatMyContent"
        default: true
        required: false
        type: boolean

      youmute:
        description: "Integrate YouMute"
        default: true
        required: false
        type: boolean

      youloop:
        description: "Integrate YouLoop"
        default: true
        required: false
        type: boolean

      ytweaks:
        description: "Integrate YTweaks"
        default: true
        required: false
        type: boolean

      youslider:
        description: "Integrate YouSlider"
        default: true
        required: false
        type: boolean

      ytholdspeed:
        description: "Integrate YTHoldForSpeed"
        default: true
        required: false
        type: boolean

      youchoose:
        description: "Integrate YouChooseQuality"
        default: true
        required: false
        type: boolean

      youshare:
        description: "Integrate YouShare"
        default: true
        required: false
        type: boolean

      gonerino:
        description: "Integrate Gonerino"
        default: true
        required: false
        type: boolean

      getcap:
        description: "Integrate YouGetCaption"
        default: true
        required: false
        type: boolean

      ytshare:
        description: "Integrate youtube-native-share"
        default: true
        required: false
        type: boolean

      volboost:
        description: "Integrate VolumeBoostYT (Require iOS 16+)"
        default: true
        required: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build IPA with tweaks
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Hide Sensitive Inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,youpip,ytuhd,ryd,abconfig,youquality,youspeed,youmute,youloop,ytweaks,youslider,ytholdspeed,youchoose,youshare,gonerino,getcap,demc,ytshare,volboost
          
      - name: Download and Validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --quiet --no-verbose -O youtube.ipa

          file_type=$(file --mime-type -b youtube.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Get YouTube Version 
        run: |
          unzip -q youtube.ipa -d ytextracted
          echo "YT_VERSION=$(grep -A 1 '<key>CFBundleVersion</key>' ytextracted/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')" >> $GITHUB_ENV

      - name: Install Dependencies
        run: brew install make ldid

      - name: Set PATH Environment Variables
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Cache Theos setup
        id: cache-theos
        uses: actions/cache@v5
        with:
          path: theos
          key: ${{ runner.os }}-theos-ios18.6-headers-v1

      - name: Prepare Theos setup
        run: |
          if [ ! -d "$THEOS/.git" ]; then
            git clone --quiet --depth=1 --recurse-submodules https://github.com/theos/theos.git "$THEOS"
          fi

          if [ ! -d "$THEOS/sdks/iPhoneOS18.6.sdk" ]; then
            git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/Tonwalter888/iOS-SDKs.git
            cd iOS-SDKs
            git sparse-checkout set --no-cone iPhoneOS18.6.sdk
            git checkout --quiet
            mv *.sdk "$THEOS/sdks"
            cd ..
          fi

          if [ ! -d "$THEOS/include/YouTubeHeader" ]; then
            git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git "$THEOS/include/YouTubeHeader"
          fi

          if [ "${{ inputs.demc }}" = "true" ] && [ ! -d "$THEOS/include/YTHeaders" ]; then
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi

          if [ ! -d "$THEOS/include/PSHeader" ]; then
            git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git "$THEOS/include/PSHeader"
          fi

      - name: Install cyan and tbd
        run: |
          if ! command -v cyan >/dev/null 2>&1; then
            pipx install https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          fi

          if ! command -v tbd >/dev/null 2>&1; then
            wget --quiet --no-verbose "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd
            chmod +x /usr/local/bin/tbd
          fi

      - name: Checkout YouMod
        uses: actions/checkout@v5
        with:
          path: YouMod

      - name: Clone Open in YouTube (Safari Extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension.git
          cd OpenYouTubeSafariExtension
          git sparse-checkout set --no-cone OpenYouTubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Build YouMod
        run: |
          cd YouMod
          echo "YOUMOD_VERSION=$(grep '^Version:' control | cut -d ' ' -f2)" >> $GITHUB_ENV
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youmod.deb

      - name: Build cached external tweaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CACHE_TAG="tweak-binary-cache"
          CACHE_VERSION="rootless-v1"
          DEFAULT_BUILD="make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless"

          is_true() {
            [ "$1" = "true" ]
          }

          safe_git() {
            env -u GIT_DIR -u GIT_WORK_TREE git "$@"
          }

          remote_sha() {
            safe_git ls-remote "$1" "${2:-HEAD}" | awk '{print $1}' | head -n 1
          }

          ensure_cache_release() {
            if gh release view "$CACHE_TAG" >/dev/null 2>&1; then
              return
            fi

            gh release create "$CACHE_TAG" \
              --draft \
              --title "Tweak Binary Cache" \
              --notes "Persistent cached external tweak .deb files for the IPA workflow."
          }

          build_cached_tweak() {
            local slug="$1"
            local repo="$2"
            local dir="$3"
            local source_sha="$4"
            local clone_mode="$5"
            local build_command="$6"
            local asset_name="${slug}-${source_sha}-${CACHE_VERSION}.deb"
            local asset_path="${GITHUB_WORKSPACE}/${asset_name}"
            local deb_path

            ensure_cache_release

            if gh release download "$CACHE_TAG" --pattern "$asset_name" --dir "$GITHUB_WORKSPACE" --clobber >/dev/null 2>&1; then
              echo "Using cached ${slug}: ${asset_name}"
              return
            fi

            echo "Cache miss for ${slug}; building ${source_sha}"
            rm -rf "$dir"

            if [ "$clone_mode" = "full" ]; then
              safe_git clone --quiet "$repo" "$dir"
            else
              safe_git clone --quiet --depth=1 "$repo" "$dir"
            fi

            (
              cd "$dir"
              if [ "$clone_mode" = "checkout" ]; then
                safe_git checkout --quiet "$source_sha"
              fi
              eval "$build_command"
            )

            deb_path="$(find "$dir/packages" -maxdepth 1 -name '*.deb' -print -quit)"
            if [ -z "$deb_path" ]; then
              echo "::error::No .deb produced for ${slug}"
              exit 1
            fi

            mv "$deb_path" "$asset_path"
            gh release upload "$CACHE_TAG" "$asset_path" --clobber
          }

          build_head_tweak() {
            local slug="$1"
            local repo="$2"
            local dir="$3"
            local build_command="${4:-$DEFAULT_BUILD}"
            local source_sha

            source_sha="$(remote_sha "$repo")"
            if [ -z "$source_sha" ]; then
              echo "::error::Unable to resolve HEAD for ${repo}"
              exit 1
            fi

            build_cached_tweak "$slug" "$repo" "$dir" "$source_sha" "shallow" "$build_command"
          }

          build_head_tweak "ygs" "https://github.com/PoomSmart/YouGroupSettings.git" "YouGroupSettings"

          if is_true "${{ inputs.youpip }}" || is_true "${{ inputs.ytuhd }}" || is_true "${{ inputs.youquality }}" || is_true "${{ inputs.youspeed }}" || is_true "${{ inputs.youmute }}" || is_true "${{ inputs.youloop }}" || is_true "${{ inputs.youshare }}" || is_true "${{ inputs.getcap }}"; then
            build_head_tweak "ytvo" "https://github.com/PoomSmart/YTVideoOverlay.git" "YTVideoOverlay"
          fi

          if is_true "${{ inputs.youpip }}"; then
            build_head_tweak "youpip" "https://github.com/PoomSmart/YouPiP.git" "YouPiP"
          fi

          if is_true "${{ inputs.ytuhd }}"; then
            build_head_tweak "ytuhd" "https://github.com/Tonwalter888/YTUHD.git" "YTUHD"
          fi

          if is_true "${{ inputs.ryd }}"; then
            build_head_tweak "ryd" "https://github.com/PoomSmart/Return-YouTube-Dislikes.git" "Return-YouTube-Dislikes"
          fi

          if is_true "${{ inputs.abconfig }}"; then
            build_head_tweak "ytabconfig" "https://github.com/PoomSmart/YTABConfig.git" "YTABConfig"
          fi

          if is_true "${{ inputs.youquality }}"; then
            build_head_tweak "youquality" "https://github.com/PoomSmart/YouQuality.git" "YouQuality"
          fi

          if is_true "${{ inputs.youspeed }}"; then
            build_head_tweak "youspeed" "https://github.com/PoomSmart/YouSpeed.git" "YouSpeed"
          fi

          if is_true "${{ inputs.demc }}"; then
            build_head_tweak "demc" "https://github.com/therealFoxster/DontEatMyContent.git" "DontEatMyContent"
          fi

          if is_true "${{ inputs.youmute }}"; then
            build_head_tweak "ym" "https://github.com/PoomSmart/YouMute.git" "YouMute"
          fi

          if is_true "${{ inputs.youloop }}"; then
            build_head_tweak "youloop" "https://github.com/bhackel/YouLoop.git" "YouLoop"
          fi

          if is_true "${{ inputs.youslider }}"; then
            build_head_tweak "youslider" "https://github.com/PoomSmart/YouSlider.git" "YouSlider"
            build_head_tweak "alderis" "https://github.com/hbang/Alderis.git" "Alderis" "make clean package DEBUG=0 FINALPACKAGE=1 ARCHS=arm64"
          fi

          if is_true "${{ inputs.ytholdspeed }}"; then
            build_head_tweak "ytholdspeed" "https://github.com/joshuaseltzer/YTHoldForSpeed.git" "YTHoldForSpeed" "make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless TARGET=iphone:clang:latest:15.0 ARCHS=arm64"
          fi

          if is_true "${{ inputs.youchoose }}"; then
            build_cached_tweak \
              "youchoose" \
              "https://github.com/PoomSmart/YouChooseQuality.git" \
              "YouChooseQuality" \
              "1585a3691b2ef0b59d42c40c31639fd8b79e2cd4" \
              "checkout" \
              "$DEFAULT_BUILD"
          fi

          if is_true "${{ inputs.youshare }}"; then
            build_head_tweak "youshare" "https://github.com/Tonwalter888/YouShare.git" "YouShare"
          fi

          if is_true "${{ inputs.ytweaks }}"; then
            build_head_tweak "ytweaks" "https://github.com/fosterbarnes/YTweaks.git" "YTweaks"
          fi

          if is_true "${{ inputs.gonerino }}"; then
            build_head_tweak "gonerino" "https://github.com/castdrian/Gonerino.git" "Gonerino"
          fi

          if is_true "${{ inputs.getcap }}"; then
            build_head_tweak "ygc" "https://github.com/PoomSmart/YouGetCaption.git" "YouGetCaption"
          fi

          if is_true "${{ inputs.ytshare }}"; then
            ytnative_sha="$(remote_sha "https://github.com/jkhsjdhjs/youtube-native-share.git")"
            protobuf_sha="$(remote_sha "https://github.com/protocolbuffers/protobuf.git")"
            build_cached_tweak \
              "ytnativeshare" \
              "https://github.com/jkhsjdhjs/youtube-native-share.git" \
              "youtube-native-share" \
              "${ytnative_sha}-${protobuf_sha}" \
              "shallow" \
              "safe_git clone --quiet --depth=1 https://github.com/protocolbuffers/protobuf.git && make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64"
          fi

          if is_true "${{ inputs.volboost }}"; then
            build_head_tweak "volboostyt" "https://github.com/VasirakCalgux/VolumeBoostYT.git" "VolumeBoostYT" "make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless ARCHS=arm64"
          fi

      - name: Inject Tweaks Into IPA
        run: |
          tweaks="OpenYouTubeSafariExtension.appex"

          for f in *.deb; do
            tweaks="$tweaks $f"
          done

          cyan -i youtube.ipa -o YouMod_${{ env.YT_VERSION }}_v${{ env.YOUMOD_VERSION }}.ipa -uwef $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Create a Draft Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: youmod-ipa${{ github.run_number }}
          name: YouMod_${{ env.YT_VERSION }}_v${{ env.YOUMOD_VERSION }} (${{ github.run_number }}) 
          files: YouMod_${{ env.YT_VERSION }}_v${{ env.YOUMOD_VERSION }}.ipa
          draft: true

      - name: Job Summary - Build Complete
        run: |
          echo -e '### 🛠️ Build IPA with tweaks Complete!' >> $GITHUB_STEP_SUMMARY

      - name: Job Summary - Output the Draft Release Link
        run: |
          echo -e '### 🚀 Draft Release\n\nDraft release has been created successfully! You can view your release here: https://github.com/${{ github.repository }}/releases' >> $GITHUB_STEP_SUMMARY     
          
      - name: Job Summary - Cleanup
        run: |
          echo -e '### 🧹 Cleanup\n\nYou can remove previous GitHub Actions run here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-workflows-run.yml And if you want to delelte old draft releases you have then here: https://github.com/${{ github.repository }}/actions/workflows/delete-old-draft-releases.yml' >> $GITHUB_STEP_SUMMARY
