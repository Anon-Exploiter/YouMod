name: Delete old draft releases
on:
  workflow_dispatch:
    inputs:
      time:
        description: "Set a certain amount of time you want to keep. (s=seconds, m=minutes, h=hours, d=days, w=weeks, mo=months, y=years)"
        default: ""
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Delete old draft releases
    runs-on: ubuntu-latest
    steps:
      - name: Delete old draft releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CACHE_RELEASE_TAG: tweak-binary-cache
          THRESHOLD: ${{ inputs.time }}
        run: |
          set -euo pipefail

          cutoff_epoch=""
          if [ -n "$THRESHOLD" ]; then
            if [[ ! "$THRESHOLD" =~ ^([0-9]+)(mo|[smhdwy])$ ]]; then
              echo "::error::Invalid threshold '${THRESHOLD}'. Use s, m, h, d, w, mo, or y."
              exit 1
            fi

            amount="${BASH_REMATCH[1]}"
            unit="${BASH_REMATCH[2]}"
            case "$unit" in
              s) unit_name="seconds" ;;
              m) unit_name="minutes" ;;
              h) unit_name="hours" ;;
              d) unit_name="days" ;;
              w) unit_name="weeks" ;;
              mo) unit_name="months" ;;
              y) unit_name="years" ;;
            esac

            cutoff_epoch="$(date -u -d "${amount} ${unit_name} ago" +%s)"
          fi

          gh release list --limit 1000 --json tagName,isDraft,createdAt --jq '.[] | select(.isDraft) | [.tagName, .createdAt] | @tsv' |
          while IFS=$'\t' read -r tag created_at; do
            if [ "$tag" = "$CACHE_RELEASE_TAG" ]; then
              echo "Keeping cache release ${tag}"
              continue
            fi

            if [ -n "$cutoff_epoch" ]; then
              created_epoch="$(date -u -d "$created_at" +%s)"
              if [ "$created_epoch" -gt "$cutoff_epoch" ]; then
                echo "Keeping recent draft release ${tag}"
                continue
              fi
            fi

            echo "Deleting draft release ${tag}"
            gh release delete "$tag" --yes --cleanup-tag
          done
